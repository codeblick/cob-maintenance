name: Sync package to Packagist

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:

jobs:
  update-packagist:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Packagist update
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
          REPOSITORY_URL: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${PACKAGIST_USERNAME:-}" ] || [ -z "${PACKAGIST_API_TOKEN:-}" ]; then
            echo "Missing secrets: PACKAGIST_USERNAME and/or PACKAGIST_API_TOKEN"
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header 'content-type:application/json' \
            --data "{\"repository\":{\"url\":\"${REPOSITORY_URL}\"}}" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}"

          echo "Packagist update request sent for ${REPOSITORY_URL}."
